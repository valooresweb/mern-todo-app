name: Deploy App

on:
  workflow_dispatch:

jobs:

  # ======================
  # SONAR FRONTEND
  # ======================
  sonar-frontend:
    runs-on: r2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Frontend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINA }}
        with:
          args: >
            -Dsonar.projectKey=new-mern-project
            -Dsonar.sources=frontend

  # ======================
  # SONAR BACKEND
  # ======================
  sonar-backend:
    runs-on: r2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Backend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINABACKEND2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINABACKEND2 }}
        with:
          args: >
            -Dsonar.projectKey=Mern-app-backend
            -Dsonar.sources=backend

  # ======================
  # BUILD IMAGES
  # ======================
  build:
    runs-on: r2
    needs: [sonar-frontend, sonar-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build Frontend Image
        run: docker build -t zeina-frontend:latest -f frontend/Dockerfile frontend

      # Optional: Save images for downstream jobs
      - name: Save Backend Image
        run: docker save zeina-backend:latest -o backend.tar

      - name: Save Frontend Image
        run: docker save zeina-frontend:latest -o frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar

  # ======================
  # TRIVY BACKEND SCAN
  # ======================
  trivy-backend:
    runs-on: r2
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend.tar

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH=$HOME/.local/bin:$PATH

      - name: Verify Trivy
        run: trivy --version

      - name: Scan Backend Image
        run: |
          trivy image \
            --severity CRITICAL \
            --vuln-type os \
            --exit-code 1 \
            zeina-backend:latest

      - name: Generate Backend Report
        run: trivy image -f json -o backend-report.json zeina-backend:latest || true

      - name: Upload Backend Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: backend-report.json

  # ======================
  # TRIVY FRONTEND SCAN
  # ======================
  trivy-frontend:
    runs-on: r2
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Frontend Image
        run: docker load -i frontend.tar

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH=$HOME/.local/bin:$PATH

      - name: Verify Trivy
        run: trivy --version

      - name: Scan Frontend Image
        run: |
          trivy image \
            --severity CRITICAL \
            --vuln-type os,library \
            --exit-code 1 \
            zeina-frontend:latest

      - name: Generate Frontend Report
        run: trivy image -f json -o frontend-report.json zeina-frontend:latest || true

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-report
          path: frontend-report.json

  # ======================
  # BACKUP
  # ======================
  backup:
    runs-on: r2
    needs: [build, trivy-backend, trivy-frontend]
    if: always()
    steps:
      - name: Create Backup Folder
        run: |
          BACKUP_TIME=$(date +%Y%m%d-%H%M%S)
          mkdir -p /home/zeina/backups/mern/$BACKUP_TIME

      - name: Save Backend Image
        run: docker save zeina-backend:latest -o /home/zeina/backups/mern/backend.tar

      - name: Save Frontend Image
        run: docker save zeina-frontend:latest -o /home/zeina/backups/mern/frontend.tar

  # ======================
  # DEPLOY
  # ======================
  deploy:
    runs-on: r2
    needs: [backup]
    steps:
      - name: Restart Containers
        run: |
          docker compose down
          docker compose up -d

      - name: Show Containers
        run: docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
