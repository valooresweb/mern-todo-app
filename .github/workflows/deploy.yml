name: Manual Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, zeina]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show branch
        run: git branch

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

     
