name: Manual Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, zeina]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start app
        run: |
          docker compose down
          docker compose up -d --build

      - name: Show running containers
        run: docker ps
