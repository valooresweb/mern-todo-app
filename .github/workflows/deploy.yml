name: Deploy App

on:
  workflow_dispatch:

jobs:

  # ======================
  # FRONTEND SONAR
  # ======================
  sonar-frontend:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Frontend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINA }}
        with:
          args: >
            -Dsonar.projectKey=new-mern-project
            -Dsonar.sources=frontend

  # ======================
  # BACKEND SONAR
  # ======================
  sonar-backend:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Backend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINABACKEND2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINABACKEND2 }}
        with:
          args: >
            -Dsonar.projectKey=Mern-app-backend
            -Dsonar.sources=backend

  # ======================
  # BUILD
  # ======================
  build:
    runs-on: r2
    needs: [sonar-frontend, sonar-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build frontend
        run: docker build -t zeina-frontend:latest -f frontend/Dockerfile frontend

  # ======================
  # TRIVY SECURITY SCAN
  # ======================
  trivy:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb

          sudo dpkg -i trivy_0.65.0_Linux-64bit.deb

      - name: Verify Trivy
        run: trivy --version

      # Scan Docker configurations
      - name: Scan Backend Dockerfile
        run: trivy config backend/

      - name: Scan Frontend Dockerfile
        run: trivy config frontend/

      # Scan built images
      - name: Scan Backend Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            zeina-backend:latest

      - name: Scan Frontend Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            zeina-frontend:latest

      # Generate reports
      - name: Generate Backend Report
        run: |
          trivy image \
            -f json \
            -o backend-report.json \
            zeina-backend:latest

      - name: Generate Frontend Report
        run: |
          trivy image \
            -f json \
            -o frontend-report.json \
            zeina-frontend:latest

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: |
            backend-report.json
            frontend-report.json

  # ======================
  # BACKUP
  # ======================
  backup:
    runs-on: r2
    needs: [build, trivy]
    if: always()

    steps:
      - name: Set timestamp
        run: echo "BACKUP_TIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Create backup folder
        run: mkdir -p /home/zeina/backups/mern/$BACKUP_TIME

      - name: Save backend image
        run: docker save zeina-backend:latest -o /home/zeina/backups/mern/$BACKUP_TIME/backend.tar

      - name: Save frontend image
        run: docker save zeina-frontend:latest -o /home/zeina/backups/mern/$BACKUP_TIME/frontend.tar

  # ======================
  # DEPLOY
  # ======================
  deploy:
    runs-on: r2
    needs: [build, backup, trivy]

    steps:
      - name: Restart containers
        run: |
          docker compose down
          docker compose up -d

      - name: Show containers
        run: docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
