name: Deploy App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: r2   # your server runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ======================
      # BUILD IMAGES ON SERVER
      # ======================
      - name: Build backend image
        run: docker build -t mern-backend:latest -f backend/Dockerfile backend

      - name: Build frontend image
        run: docker build -t mern-frontend:latest -f frontend/Dockerfile frontend

      # ======================
      # CLEAN RESTART
      # ======================
      - name: Restart containers
        run: |
          docker compose down
          docker compose up -d --build

      - name: Show running containers
        run: docker ps
