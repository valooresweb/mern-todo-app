name: Deploy App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mern-todo-app:latest .

      - name: Save image to tar file
        run: docker save mern-todo-app:latest -o app.tar

      - name: Copy image to server
        run: |
          scp -o StrictHostKeyChecking=no app.tar user@YOUR_SERVER_IP:/tmp/app.tar
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Load image and deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no user@YOUR_SERVER_IP << 'EOF'
            docker load -i /tmp/app.tar
            docker stop mern-app || true
            docker rm mern-app || true
            docker run -d --name mern-app -p 3000:3000 mern-todo-app:latest
          EOF
