name: Deploy App


on:
  workflow_dispatch:


jobs:
  deploy:
    runs-on: [self-hosted, zeina]

    steps:
      - name: Sync with GitHub
        run: |
          cd /home/zeina/mern-todo-app
          git fetch origin
          git reset --hard origin/master
          git clean -fd

      - name: Restart app
        run: |
          cd /home/zeina/mern-todo-app
          docker compose down
          docker compose up -d --build
