name: Deploy App

on:
  workflow_dispatch:

jobs:

  # ======================
  # 0. SONARQUBE SCAN
  # ======================
  sonar:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # FRONTEND SCAN
      # ======================
      - name: Sonar Frontend
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINA }}
        with:
          args: >
            -Dsonar.projectKey=mern-frontend
            -Dsonar.projectName=Frontend
            -Dsonar.sources=frontend
            -Dsonar.sourceEncoding=UTF-8

      # ======================
      # BACKEND SCAN
      # ======================
      - name: Sonar Backend
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINABACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINABACKEND }}
        with:
          args: >
            -Dsonar.projectKey=mern-backend
            -Dsonar.projectName=Backend
            -Dsonar.sources=backend
            -Dsonar.sourceEncoding=UTF-8

  # ======================
  # 1. BUILD IMAGES
  # ======================
  build:
    runs-on: r2
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build frontend
        run: docker build -t zeina-frontend:latest -f frontend/Dockerfile frontend

  # ======================
  # 2. BACKUP IMAGES
  # ======================
  backup:
    runs-on: r2
    needs: build
    if: always()

    steps:
      - name: Set timestamp
        run: echo "BACKUP_TIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Create backup folder
        run: mkdir -p /home/zeina/backups/mern/$BACKUP_TIME

      - name: Save backend image
        run: docker save zeina-backend:latest -o /home/zeina/backups/mern/$BACKUP_TIME/backend.tar

      - name: Save frontend image
        run: docker save zeina-frontend:latest -o /home/zeina/backups/mern/$BACKUP_TIME/frontend.tar

  # ======================
  # 3. DEPLOY
  # ======================
  deploy:
    runs-on: r2
    needs: [build, backup]

    steps:
      - name: Restart containers
        run: |
          docker compose down
          docker compose up -d

      - name: Show containers
        run: docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
