name: Deploy App

on:
  workflow_dispatch:

jobs:

# ======================
# BUILD IMAGES
# ======================
  build:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=http://172.31.13.167:8002/api \
            -t zeina-frontend:latest \
            -f frontend/Dockerfile frontend

      # SAVE IMAGES (IMPORTANT FIX)
      - name: Save Backend Image
        run: docker save zeina-backend:latest -o backend.tar

      - name: Save Frontend Image
        run: docker save zeina-frontend:latest -o frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar

# ======================
# TRIVY BACKEND SCAN
# ======================
  trivy-backend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend.tar

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: zeina-backend:latest
          severity: CRITICAL
          exit-code: 1
          vuln-type: os,library

# ======================
# TRIVY FRONTEND SCAN
# ======================
  trivy-frontend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Frontend Image
        run: docker load -i frontend.tar

      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: zeina-frontend:latest
          severity: CRITICAL
          exit-code: 1
          vuln-type: os,library

# ======================
# BACKUP
# ======================
  backup:
    runs-on: r2
    needs: [build, trivy-backend, trivy-frontend]

    steps:
      - name: Create Backup Folder
        run: |
          mkdir -p /home/zeina/backups/mern/$(date +%Y%m%d-%H%M%S)

      - name: Save Images
        run: |
          docker save zeina-backend:latest -o /home/zeina/backups/mern/backend.tar
          docker save zeina-frontend:latest -o /home/zeina/backups/mern/frontend.tar

# ======================
# DEPLOY
# ======================
  deploy:
    runs-on: r2
    needs: [backup]

    steps:
      - name: Deploy Containers
        run: |
          docker compose down
          docker compose up -d --force-recreate
