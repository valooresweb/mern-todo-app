name: Deploy App

on:
  workflow_dispatch:

jobs:

  # ======================
  # FRONTEND SONAR
  # ======================
  sonar-frontend:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Frontend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINA }}
        with:
          args: >
            -Dsonar.projectKey=new-mern-project
            -Dsonar.sources=frontend

  # ======================
  # BACKEND SONAR
  # ======================
  sonar-backend:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Backend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINABACKEND2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINABACKEND2 }}
        with:
          args: >
            -Dsonar.projectKey=Mern-app-backend
            -Dsonar.sources=backend

  # ======================
  # BUILD IMAGES
  # ======================
  build:
    runs-on: r2
    needs: [sonar-frontend, sonar-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build frontend image
        run: docker build -t zeina-frontend:latest -f frontend/Dockerfile frontend

  # ======================
  # BACKEND TRIVY SCAN
  # ======================
  trivy-backend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Trivy
        run: trivy --version

      - name: Scan Backend Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            zeina-backend:latest

      - name: Generate Backend Report
        run: |
          trivy image -f json -o backend-report.json zeina-backend:latest

      - name: Upload Backend Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: backend-report.json

  # ======================
  # FRONTEND TRIVY SCAN
  # ======================
  trivy-frontend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Trivy
        run: trivy --version

      - name: Scan Frontend Image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            zeina-frontend:latest

      - name: Generate Frontend Report
        run: |
          trivy image -f json -o frontend-report.json zeina-frontend:latest

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-report
          path: frontend-report.json

  # ======================
  # BACKUP
  # ======================
  backup:
    runs-on: r2
    needs: [build, trivy-backend, trivy-frontend]
    if: always()

    steps:
      - name: Create backup folder
        run: |
          BACKUP_TIME=$(date +%Y%m%d-%H%M%S)
          mkdir -p /home/zeina/backups/mern/$BACKUP_TIME

      - name: Save backend image
        run: docker save zeina-backend:latest -o /home/zeina/backups/mern/backend.tar

      - name: Save frontend image
        run: docker save zeina-frontend:latest -o /home/zeina/backups/mern/frontend.tar

  # ======================
  # DEPLOY
  # ======================
  deploy:
    runs-on: r2
    needs: [build, backup, trivy-backend, trivy-frontend]

    steps:
      - name: Restart containers
        run: |
          docker compose down
          docker compose up -d

      - name: Show containers
        run: docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
