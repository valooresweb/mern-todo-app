name: Deploy App

on:
  workflow_dispatch:

jobs:

# ======================
# SONAR FRONTEND
# ======================
  sonar-frontend:
    runs-on: r2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Frontend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINA }}
        with:
          args: >
            -Dsonar.projectKey=new-mern-project
            -Dsonar.sources=frontend

# ======================
# SONAR BACKEND
# ======================
  sonar-backend:
    runs-on: r2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Backend Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKENZEINABACKEND2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URLZEINABACKEND2 }}
        with:
          args: >
            -Dsonar.projectKey=Mern-app-backend
            -Dsonar.sources=backend

# ======================
# BUILD IMAGES
# ======================
  build:
    runs-on: r2
    needs: [sonar-frontend, sonar-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=http://172.31.13.167:8002/api \
            -t zeina-frontend:latest \
            -f frontend/Dockerfile frontend

# ======================
# TRIVY BACKEND SCAN (FIXED)
# ======================
  trivy-backend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend.tar

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: zeina-backend:latest
          severity: CRITICAL
          exit-code: 1
          vuln-type: os,library

# ======================
# TRIVY FRONTEND SCAN (FIXED)
# ======================
  trivy-frontend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Frontend Image
        run: docker load -i frontend.tar

      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: zeina-frontend:latest
          severity: CRITICAL
          exit-code: 1
          vuln-type: os,library

# ======================
# BACKUP
# ======================
  backup:
    runs-on: r2
    needs: [build, trivy-backend, trivy-frontend]

    steps:
      - name: Create Backup Folder
        run: |
          mkdir -p /home/zeina/backups/mern/$(date +%Y%m%d-%H%M%S)

      - name: Save Images
        run: |
          docker save zeina-backend:latest -o /home/zeina/backups/mern/backend.tar
          docker save zeina-frontend:latest -o /home/zeina/backups/mern/frontend.tar

# ======================
# DEPLOY
# ======================
  deploy:
    runs-on: r2
    needs: [backup]

    steps:
      - name: Deploy Containers
        run: |
          docker compose down
          docker compose up -d --force-recreate
