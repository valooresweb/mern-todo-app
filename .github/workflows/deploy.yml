name: Deploy App

on:
  workflow_dispatch:

jobs:

# ======================
# BUILD IMAGES
# ======================
  build:
    runs-on: r2

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t zeina-backend:latest -f backend/Dockerfile backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=http://172.31.13.167:8002/api \
            -t zeina-frontend:latest \
            -f frontend/Dockerfile frontend

      - name: Save Images
        run: |
          docker save zeina-backend:latest -o backend.tar
          docker save zeina-frontend:latest -o frontend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend.tar

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar

# ======================
# TRIVY BACKEND SCAN (IMAGE MODE)
# ======================
  trivy-backend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend.tar

      - name: Run Trivy (Backend)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL \
            --vuln-type os,library \
            --exit-code 1 \
            zeina-backend:latest

# ======================
# TRIVY FRONTEND SCAN (IMAGE MODE)
# ======================
  trivy-frontend:
    runs-on: r2
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Frontend Image
        run: docker load -i frontend.tar

      - name: Run Trivy (Frontend)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL \
            --vuln-type os,library \
            --exit-code 1 \
            zeina-frontend:latest

# ======================
# BACKUP
# ======================
  backup:
    runs-on: r2
    needs: [build, trivy-backend, trivy-frontend]

    steps:
      - name: Create Backup Folder
        run: |
          mkdir -p /home/zeina/backups/mern/$(date +%Y%m%d-%H%M%S)

      - name: Save Images
        run: |
          docker save zeina-backend:latest -o /home/zeina/backups/mern/backend.tar
          docker save zeina-frontend:latest -o /home/zeina/backups/mern/frontend.tar

# ======================
# DEPLOY
# ======================
  deploy:
    runs-on: r2
    needs: [backup]

    steps:
      - name: Deploy Containers
        run: |
          docker compose down
          docker compose up -d --force-recreate
