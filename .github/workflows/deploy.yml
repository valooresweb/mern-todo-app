name: Deploy App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: r2   # self-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ======================
      # TIMESTAMP
      # ======================
      - name: Set timestamp
        run: echo "BACKUP_TIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      # ======================
      # BUILD (ONLY LATEST)
      # ======================
      - name: Build backend image
        run: docker build -t mern-backend:latest -f backend/Dockerfile backend

      - name: Build frontend image
        run: docker build -t mern-frontend:latest -f frontend/Dockerfile frontend

      # ======================
      # BACKUP DIRECTORY
      # ======================
      - name: Create backup folder
        run: mkdir -p /home/zeina/backups/mern/$BACKUP_TIME

      # ======================
      # SAVE BACKUPS (FILES ONLY)
      # ======================
      - name: Save backend image
        run: docker save mern-backend:latest -o /home/zeina/backups/mern/$BACKUP_TIME/backend.tar

      - name: Save frontend image
        run: docker save mern-frontend:latest -o /home/zeina/backups/mern/$BACKUP_TIME/frontend.tar

      # ======================
      # DEPLOY
      # ======================
      - name: Restart containers
        run: |
          docker compose down
          docker compose up -d

      # ======================
      # STATUS
      # ======================
      - name: Show containers
        run: docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
