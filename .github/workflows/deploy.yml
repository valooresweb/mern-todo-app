name: Manual Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, zeerunner]

    steps:
      - name: Go to project folder
        run: cd ~/mern-todo-app

      - name: Pull latest code
        run: |
          cd ~/mern-todo-app
          git pull origin main

      - name: Build containers
        run: |
          cd ~/mern-todo-app
          docker compose build

      - name: Start containers
        run: |
          cd ~/mern-todo-app
          docker compose up -d

      - name: Health check backend
        run: curl -f http://localhost:8002

      - name: Health check frontend
        run: curl -f http://localhost:3001
