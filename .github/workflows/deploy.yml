name: Deploy App

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, zeina]

    steps:
      - name: Update code on server
        run: |
          cd /home/zeina/mern-todo-app
          git pull origin master

      - name: Restart containers
        run: |
          cd /home/zeina/mern-todo-app
          docker compose down
          docker compose up -d --build

      - name: Show running containers
        run: docker ps
