
name: CI/CD

on:
  workflow_dispatch:

env:
  APP_DIR: /home/gaelle/g_app/todo-app
  BACKUP_DIR: /home/gaelle/g_app/backups

jobs:


  # 1. PREPARE
  prepare:
    runs-on: [self-hosted, gaelle]

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image version
        id: version
        run: |
          VERSION=$(date +'%Y%m%d-%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT


  # 2. BACKUP
  backup:
    runs-on: [self-hosted, gaelle]
    needs: prepare

    steps:
      - name: Create backup directory
        run: |
          mkdir -p $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/backend
          mkdir -p $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/frontend

      - name: Backup current images
        run: |
          if docker image inspect mern-backend:latest > /dev/null 2>&1; then
            docker save \
              -o $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/backend/backend.tar \
              mern-backend:latest
          fi

          if docker image inspect mern-frontend:latest > /dev/null 2>&1; then
            docker save \
              -o $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/frontend/frontend.tar \
              mern-frontend:latest
          fi


  sonar:
    runs-on: [self-hosted, gaelle]
    needs: backup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # FRONTEND ONLY
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: SonarQube Scan (Frontend)
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.G_SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.G_SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mern-todo-app
            -Dsonar.projectName="MERN Todo App Frontend"
            -Dsonar.sources=frontend/src
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/node_modules/**
            
  
  # 3. STOP OLD CONTAINERS
  stop_containers:
    runs-on: [self-hosted, gaelle]
    needs: sonar

    steps:
      - name: Stop old containers
        run: |
          docker compose -f $APP_DIR/docker-compose.yml down || true


  # 4. REMOVE OLD IMAGES
  remove_old_images:
    runs-on: [self-hosted, gaelle]
    needs: stop_containers

    steps:
      - name: Remove old backend image
        run: |
          docker rmi mern-backend:latest || true

      - name: Remove old frontend image
        run: |
          docker rmi mern-frontend:latest || true


  # 5. BUILD BACKEND
  build_backend:
    runs-on: [self-hosted, gaelle]
    needs: remove_old_images

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t mern-backend:latest ./backend

  # 6. BUILD FRONTEND
  build_frontend:
    runs-on: [self-hosted, gaelle]
    needs: remove_old_images

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build -t mern-frontend:latest ./frontend

  # 7. DEPLOY
  deploy:
    runs-on: [self-hosted, gaelle]
    needs: [build_backend, build_frontend]

    steps:
      - name: Start containers
        run: |
          docker compose -f $APP_DIR/docker-compose.yml up -d


  # 8. VERIFY
  verify:
    runs-on: [self-hosted, gaelle]
    needs: deploy

    steps:
      - name: Show running containers
        run: docker ps

      - name: Show Docker images
        run: |
          docker images | grep mern

      - name: Show backup folders
        run: |
          ls -R $BACKUP_DIR

