
name: CI/CD

on:
  workflow_dispatch:

env:
  APP_DIR: /home/gaelle/g_app/todo-app
  BACKUP_DIR: /home/gaelle/g_app/backups

jobs:
  # 1. PREPARE
  prepare:
    runs-on: [self-hosted, gaelle]

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image version
        id: version
        run: |
          VERSION=$(date +'%Y%m%d-%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # 2. BACKUP
  backup:
    runs-on: [self-hosted, gaelle]
    needs: prepare

    steps:
      - name: Create backup directory
        run: |
          mkdir -p $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/backend
          mkdir -p $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/frontend

      - name: Backup current images
        run: |
          if docker image inspect mern-backend:latest > /dev/null 2>&1; then
            docker save \
              -o $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/backend/backend.tar \
              mern-backend:latest
          fi

          if docker image inspect mern-frontend:latest > /dev/null 2>&1; then
            docker save \
              -o $BACKUP_DIR/versions/${{ needs.prepare.outputs.version }}/frontend/frontend.tar \
              mern-frontend:latest
          fi
 
