
name: CI/CD

on:
  workflow_dispatch:

env:
  APP_DIR: /home/gaelle/g_app/todo-app

jobs:
  deploy:
    runs-on: [self-hosted, gaelle]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Generate image version 
        id: version 
        run: | 
          echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build backend image
        run: |
          docker build \
            -t mern-backend:latest \
            -t mern-backend:${VERSION} \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t mern-frontend:latest \
            -t mern-frontend:${VERSION} \
            ./frontend

      - name: Show created version 
        run: | 
          echo "Created version: ${VERSION}"

      - name: Stop old containers
        run: |
          docker compose -f $APP_DIR/docker-compose.yml down || true

      - name: Start containers
        run: |
          docker compose -f $APP_DIR/docker-compose.yml up -d

      - name: Show running containers
        run: docker ps

      - name: Show Docker images 
        run: | 
          docker images | grep mern

