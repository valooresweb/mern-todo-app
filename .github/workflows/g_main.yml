#            -Dsonar.projectName="MERN Todo Backend"
#            -Dsonar.sources=backend
#            -Dsonar.sourceEncoding=UTF-8
#            -Dsonar.exclusions=**/node_modules/**
  
  # 4. STOP OLD CONTAINERS
  stop_containers:
    runs-on: [self-hosted, gaelle]
    needs: backup

    steps:
      - name: Stop old containers
        run: |
          docker compose -f $APP_DIR/docker-compose.yml down || true

  # 4. REMOVE OLD IMAGES
  remove_old_images:
    runs-on: [self-hosted, gaelle]
    needs: stop_containers

    steps:
      - name: Remove old backend image
        run: |
          docker rmi mern-backend:latest || true

      - name: Remove old frontend image
        run: |
          docker rmi mern-frontend:latest || true

  # 5. BUILD BACKEND
  build_backend:
    runs-on: [self-hosted, gaelle]
    needs: remove_old_images

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t mern-backend:latest ./backend

  # 6. BUILD FRONTEND
  build_frontend:
    runs-on: [self-hosted, gaelle]
    needs: remove_old_images
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Build frontend image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=http://172.31.13.167:8000 \
            -t mern-frontend:latest ./frontend

  # 7. TRIVY SECURITY SCAN
  trivy_backend:
    runs-on: [self-hosted, gaelle]
    needs: build_backend
  
    steps:
      - name: Ensure Trivy Docker Image Exists
        run: docker pull aquasec/trivy:latest
  
      - name: Backend - Warning HIGH
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH \
            --exit-code 0 \
            mern-backend:latest
  
      - name: Backend - Fail CRITICAL
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --pkg-types os \
            --severity CRITICAL \
            --exit-code 1 \
            mern-backend:latest
       
  trivy_frontend:
    runs-on: [self-hosted, gaelle]
    needs: build_frontend
  
    steps:
      - name: Ensure Trivy Docker Image Exists
        run: docker pull aquasec/trivy:latest
  
      - name: Frontend - Warning HIGH
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH \
            --exit-code 0 \
            mern-frontend:latest
  
      - name: Frontend - Fail CRITICAL
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL \
            --exit-code 1 \
            mern-frontend:latest

  # 8. DEPLOY
  deploy:
    runs-on: [self-hosted, gaelle]
    needs: [trivy_backend, trivy_frontend]

    steps:
      - name: Start containers
        run: |
          docker compose -f $APP_DIR/docker-compose.yml up -d

  # 9. VERIFY
  verify:
    runs-on: [self-hosted, gaelle]
    needs: deploy

    steps:
      - name: Show running containers
        run: docker ps

      - name: Show Docker images
        run: |
          docker images | grep mern

      - name: Show backup folders
        run: |
          ls -R $BACKUP_DIR

