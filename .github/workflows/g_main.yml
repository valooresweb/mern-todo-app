name: CI/CD 

on:
  workflow_dispatch:
  
env:
  APP_DIR: /home/gaelle/g_app/todo-app

  
jobs:
  deploy:
    runs-on: [self-hosted, gaelle]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Stop old containers
        run: |
          docker compose -f /home/gaelle/g_app/todo-app/docker-compose.yml down || true
    
      - name: Build and start containers
        run: |
          docker compose -f /home/gaelle/g_app/todo-app/docker-compose.yml up -d --build
    
      - name: Show running containers
        run: docker ps

